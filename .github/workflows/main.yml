name: CI

on:
  push:
    paths-ignore:
      - "**/*.md"
  pull_request:
    paths-ignore:
      - "**/*.md"

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    env:
      DOTNET_CLI_TELEMETRY_OPTOUT: 1
      DOTNET_SKIP_FIRST_TIME_EXPERIENCE: 1
      DOTNET_NOLOGO: 1
      NUGET_PACKAGES: ${{ github.workspace }}/.nuget/packages

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup .NET (global.json)
        uses: actions/setup-dotnet@v5
        with:
          global-json-file: global.json

      - name: Show .NET SDK info
        shell: bash
        run: |
          dotnet --version
          dotnet --info

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ${{ env.NUGET_PACKAGES }}
          key: nuget-${{ runner.os }}-${{ hashFiles('**/packages.lock.json', '**/*.csproj', '**/*.sln', '**/Directory.Packages.props', 'global.json') }}
          restore-keys: |
            nuget-${{ runner.os }}-

      - name: Install Linux native deps (Avalonia/Skia)
        shell: bash
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libx11-6 libice6 libsm6 libfontconfig1 \
            libxext6 libxrender1 libxcursor1 libxinerama1 libxi6 libxrandr2 \
            libglib2.0-0
          sudo apt-get clean

      - name: Restore (only required projects, locked if lock exists)
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p "$NUGET_PACKAGES"

          restore_one () {
            local proj="$1"
            local proj_dir
            proj_dir="$(dirname "$proj")"

            local lock1="$proj_dir/packages.lock.json"
            local lock2="$proj_dir/Packages.lock.json"

            if [ -f "$lock1" ] || [ -f "$lock2" ]; then
              echo "Restoring (locked): $proj"
              dotnet restore "$proj" --locked-mode
            else
              echo "Restoring: $proj"
              dotnet restore "$proj"
            fi
          }

          restore_one ./PasswordManagerLocalBackend/PasswordManagerLocalBackend.csproj
          restore_one ./PasswordManagerLocal/PasswordManagerLocal/PasswordManagerLocal.csproj
          restore_one ./PasswordManagerLocalTest/PasswordManagerLocalTest.csproj

      - name: Build (only required projects)
        shell: bash
        run: |
          set -euo pipefail
          dotnet build ./PasswordManagerLocalBackend/PasswordManagerLocalBackend.csproj -c Release --no-restore
          dotnet build ./PasswordManagerLocal/PasswordManagerLocal/PasswordManagerLocal.csproj -c Release --no-restore
          dotnet build ./PasswordManagerLocalTest/PasswordManagerLocalTest.csproj -c Release --no-restore

      - name: Test (log + TRX)
        id: test
        continue-on-error: true
        shell: pwsh
        run: |
          $resultsDir = Join-Path $env:GITHUB_WORKSPACE "TestResults"
          New-Item -ItemType Directory -Force -Path $resultsDir | Out-Null

          $logPath = Join-Path $resultsDir "dotnet-test.log"
          dotnet test ./PasswordManagerLocalTest/PasswordManagerLocalTest.csproj `
            -c Release `
            --no-build `
            --logger "trx;LogFileName=tests.trx" `
            --results-directory "$resultsDir" 2>&1 | Tee-Object -FilePath $logPath

          $exit = $LASTEXITCODE
          "exitcode=$exit" | Out-File -FilePath $env:GITHUB_OUTPUT -Append

          Write-Host "==== TRX files under TestResults ===="
          Get-ChildItem -Path $resultsDir -Recurse -Filter *.trx -ErrorAction SilentlyContinue | ForEach-Object { $_.FullName }

      - name: Upload TestResults
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: testresults-ubuntu
          path: TestResults/**
          if-no-files-found: warn
          retention-days: 7

      - name: Summarize test results
        if: always()
        shell: pwsh
        run: |
          $resultsDir = Join-Path $env:GITHUB_WORKSPACE "TestResults"
          $trxFiles = Get-ChildItem -Path $resultsDir -Recurse -Filter *.trx -ErrorAction SilentlyContinue

          if (-not $trxFiles) {
            "No TRX files found. See TestResults/dotnet-test.log artifact." | Out-File -FilePath $env:GITHUB_STEP_SUMMARY -Append
            $log = Join-Path $resultsDir "dotnet-test.log"
            if (Test-Path $log) {
              "" | Out-File -FilePath $env:GITHUB_STEP_SUMMARY -Append
              "Last 160 lines of dotnet-test.log:" | Out-File -FilePath $env:GITHUB_STEP_SUMMARY -Append
              Get-Content $log -Tail 160 | Out-File -FilePath $env:GITHUB_STEP_SUMMARY -Append
            }
            exit 0
          }

          $total = 0
          $passed = 0
          $failed = 0
          $skipped = 0

          foreach ($file in $trxFiles) {
            [xml]$xml = Get-Content -Path $file.FullName
            $summary = $xml.TestRun.ResultSummary
            if ($summary -and $summary.Counters) {
              $c = $summary.Counters
              $total   += [int]($c.total       ?? 0)
              $passed  += [int]($c.passed      ?? 0)
              $failed  += [int]($c.failed      ?? 0)
              $skipped += [int]($c.notExecuted ?? 0)
            }
          }

          @"
          # Test Summary (Ubuntu)
          Total: $total
          Passed: $passed
          Failed: $failed
          Skipped: $skipped
          "@ | Out-File -FilePath $env:GITHUB_STEP_SUMMARY -Append

      - name: Fail job if tests failed
        if: steps.test.outputs.exitcode != '0'
        shell: bash
        run: exit 1