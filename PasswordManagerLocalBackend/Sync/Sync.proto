syntax = "proto3";

package sync;
option csharp_namespace = "PasswordManagerLocalBackend.Sync";

message HelloRequest  { string user_id = 1; string device_id = 2; bytes dataset_hash = 3; bytes sign_pub = 4; }
message HelloReply    { bool ok = 1; }

message NeedSyncRequest { int64 since_ts = 1; }
message NeedSyncReply   { bool needed = 1; int64 latest_ts = 2; }

message DeltaChunk {
  string entity = 1;
  bytes payload = 2;
  int64 ts = 3;
  bytes sig = 4;
  string device_id = 5;
  bytes sign_pub = 6;
  string recipient_device_id = 7;
  int32 encryption_version = 8;
  bytes ephemeral_public_key = 9;
  bytes nonce = 10;
  bytes tag = 11;
  bytes payload_hash = 12;
}

message Ack        { int64 last_synced_ts = 1; }

message GetDeviceEnrollmentInfoRequest {
  string session_id = 1;
  bytes code_proof = 2;
}

message GetDeviceEnrollmentInfoReply {
  bool ok = 1;
  string error = 2;
  string error_code = 3;
  string device_id = 4;
  string tls_cert_fingerprint = 5;
  bytes sign_pub = 6;
  bytes agreement_pub = 7;
}

message CompleteDeviceEnrollmentRequest {
  string session_id = 1;
  bytes code_proof = 2;
  bytes snapshot = 3;
  string source_device_id = 4;
  bytes source_sign_pub = 5;
  string source_tls_cert_fingerprint = 6;
}

message CompleteDeviceEnrollmentChunk {
  string session_id = 1;
  bytes code_proof = 2;
  string source_device_id = 3;
  bytes source_sign_pub = 4;
  string source_tls_cert_fingerprint = 5;
  bytes snapshot_chunk = 6;
  int32 snapshot_encryption_version = 7;
  bytes snapshot_encryption_nonce = 8;
  bytes snapshot_encryption_tag = 9;
}

message CompleteDeviceEnrollmentReply {
  bool ok = 1;
  string error = 2;
  string error_code = 3;
}


message SyncError {
  string code = 1;
  string message = 2;
}
